name = "athena"
version = "2.1.0"
license = "MIT"
author = "Ned Thaddeus Taylor"
maintainer = "n.t.taylor@exeter.ac.uk"
description = "A Fortran library for building, training and testing neural networks"

[library]
source-dir = "src"
# type = ["static"]

[build]
auto-executables = true
auto-tests = true
auto-examples = false
module-naming = false

[dependencies]
coreutils = { git = "https://github.com/nedtaylor/coreutils", tag = "v0.1.0" }
diffstruc = { git = "https://github.com/nedtaylor/diffstruc", tag = "v1.2.0" }
graphstruc = { git = "https://github.com/nedtaylor/graphstruc", tag = "v0.2.1" }

[features]
wandb.dependencies.wandb-fortran = { git = "https://github.com/nedtaylor/wandb-fortran" }
wandb.dependencies.example_library = { path = "example/example_library" }
wandb.preprocess.cpp.macros = ["_WANDB"]
wandb.example = [
	{ name = "wandb_sine", source-dir = "example/wandb_sine/src", main = "main.f90" },
	{ name = "wandb_pinn_burgers", source-dir = "example/wandb_pinn_burgers/src", main = "main.f90" },
	{ name = "wandb_sweep", source-dir = "example/wandb_sweep/src", main = "main.f90" },
	{ name = "wandb_network_sine", source-dir = "example/wandb_network_sine/src", main = "main.F90" }
]

[install]
library = false
# module-dir = "fortran/modules"

[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"

[preprocess]
[preprocess.cpp]
suffixes = ["F90", "f90"]

[[example]]
name = "sine"
source-dir = "example/sine/src"
main = "main.f90"

[example.dependencies]
example_library = { path = "example/example_library"}
atomstruc = { git = "https://github.com/nedtaylor/atomstruc", branch = "column-major-order" }


[[example]]
name = "simple"
source-dir = "example/simple/src"
main = "main.f90"

