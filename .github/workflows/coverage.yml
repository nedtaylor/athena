name: run-code-coverage

on:
  push:
    branches:
      - main
      - development
    paths:
      - ".github/workflows/coverage.yml"
      - "CMakeLists.txt"
      - "**.f90"
  pull_request:
    paths:
      - ".github/workflows/coverage.yml"
      - "CMakeLists.txt"
      - "**.f90"
  workflow_dispatch:
    inputs:
      deploy-on-any-branch:
        description: "Deploy on any branch"
        required: false
        default: "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-code-coverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc]
        version: [15]
    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: Install BLAS/LAPACK system libraries
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libblas-dev liblapack-dev

      - name: Install compiler + tools (apt)
        if: github.actor == 'nektos/act'
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y cmake gcc-15 gfortran-15
          sudo update-alternatives --install /usr/bin/gfortran gfortran /usr/bin/gfortran-15 150

      - name: Install runner dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y gcovr python3-pip

      - name: Setup CMake
        if: github.actor != 'nektos/act'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.24.x'

      - name: Setup Fortran compiler
        if: github.actor != 'nektos/act'
        uses: fortran-lang/setup-fortran@v1
        id: setup-fortran
        with:
          compiler: gcc
          version: ${{ matrix.version }}

      - name: Normalise compiler environment
        shell: bash
        run: |
          if [ "${{ github.actor }}" = 'nektos/act' ]; then
            compiler="${FC:-$(command -v gfortran-15 || command -v gfortran)}"
          else
            compiler="${FC:-${{ steps.setup-fortran.outputs.fc }}}"
          fi

          if [ -z "$compiler" ]; then
            echo "Fortran compiler was not configured" >&2
            exit 1
          fi

          compiler_dir="$(dirname "$compiler")"
          compiler_name="$(basename "$compiler")"
          compiler_version="${compiler_name##*-}"
          gcov_candidate=""

          if [ "$compiler_version" != "$compiler_name" ] && [ -x "$compiler_dir/gcov-$compiler_version" ]; then
            gcov_candidate="$compiler_dir/gcov-$compiler_version"
          elif [ -x "$compiler_dir/gcov" ]; then
            gcov_candidate="$compiler_dir/gcov"
          elif command -v "gcov-$compiler_version" >/dev/null 2>&1; then
            gcov_candidate="$(command -v "gcov-$compiler_version")"
          elif command -v gcov >/dev/null 2>&1; then
            gcov_candidate="$(command -v gcov)"
          fi

          if [ -z "$gcov_candidate" ]; then
            echo "gcov executable was not configured" >&2
            exit 1
          fi

          echo "FC=$compiler" >> "$GITHUB_ENV"
          echo "GCOV=$gcov_candidate" >> "$GITHUB_ENV"

      - name: Build project
        shell: bash -l {0}
        run: |
          build_dir="$GITHUB_WORKSPACE/build/coverage-ci"
          if command -v nproc >/dev/null 2>&1; then
            jobs=$(nproc)
          else
            jobs=$(sysctl -n hw.logicalcpu)
          fi

          "$FC" --version
          "$GCOV" --version
          cmake --version

          cmake \
            -S "$GITHUB_WORKSPACE" \
            -B "$build_dir" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_Fortran_COMPILER="$FC" \
            -DGCOV_PATH="$GCOV"
          cmake --build "$build_dir" --parallel "$jobs"

      - name: Run coverage tests
        shell: bash -l {0}
        run: |
          ctest --test-dir "$GITHUB_WORKSPACE/build/coverage-ci" --output-on-failure

      - name: Generate coverage report
        shell: bash -l {0}
        run: |
          build_dir="$GITHUB_WORKSPACE/build/coverage-ci"
          mkdir -p "$build_dir/coverage"

          gcovr \
            --gcov-executable "$GCOV" \
            --root "$GITHUB_WORKSPACE" \
            --filter "$GITHUB_WORKSPACE/src/" \
            --exclude "$GITHUB_WORKSPACE/test/" \
            --object-directory "$build_dir" \
            --html-details "$build_dir/coverage/index.html" \
            --txt "$build_dir/coverage/coverage.txt" \
            --print-summary

          sed -n '1,160p' "$build_dir/coverage/coverage.txt"

      - name: Get coverage percentage
        id: coverage_percentage
        shell: bash -l {0}
        run: |
          coverage_percentage=$(python3 ./tools/coverage_badge.py)
          echo "COVERAGE_PERCENTAGE=$coverage_percentage" >> $GITHUB_ENV
          echo "value=$coverage_percentage" >> $GITHUB_OUTPUT

      - name: Create coverage badge
        if: ${{ github.actor != 'nektos/act' && (github.ref_name == 'main' || github.ref_name == 'development' || github.ref_name == 'coverage-action') }}
        continue-on-error: true
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: fd7c07c046ecc92d92eaf7bdcb78c4b5
          filename: athena_coverage_${{ github.head_ref || github.ref_name }}.json  # Use branch-specific file
          label: Coverage
          message: ${{ steps.coverage_percentage.outputs.value }}%
          valColorRange: ${{ steps.coverage_percentage.outputs.value }}
          maxColorRange: 100
          minColorRange: 0

      - name: upload artifact
        if: github.actor != 'nektos/act'
        uses: actions/upload-pages-artifact@v4
        with:
          path: './build/coverage-ci/coverage/'

  deploy:
    if: ${{ github.actor != 'nektos/act' && ( github.ref_name == 'main' || github.event.inputs.deploy-on-any-branch == 'true' ) }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: run-code-coverage
    steps:
      - name: deploy to Github Pages (main branch)
        id: deployment
        uses: actions/deploy-pages@v4
