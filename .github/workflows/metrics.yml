name: run-metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      allow_any_branch:
        description: "Allow running on any branch"
        required: false
        default: "false"

      backfill:
        description: "Backfill last 14 days of metrics"
        required: false
        default: "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  backfill-metrics:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.backfill == 'true'

    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3

      - name: backfill last 14 days
        shell: bash
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p build/pages/metrics

          FILE="build/pages/metrics/history.json"

          # start with existing history if present
          if [ -f "$FILE" ]; then
            cp "$FILE" tmp.json
          else
            echo "[]" > tmp.json
          fi

          for i in $(seq 0 13); do
            DATE=$(date -u -d "$i days ago" +"%Y-%m-%d")

            repo=$(curl -s -H "Authorization: Bearer $TOKEN" \
              https://api.github.com/repos/nedtaylor/athena)

            stars=$(echo "$repo" | jq .stargazers_count)
            forks=$(echo "$repo" | jq .forks_count)

            clones=$(curl -s -H "Authorization: Bearer $TOKEN" \
              https://api.github.com/repos/nedtaylor/athena/traffic/clones)

            clones_total=$(echo "$clones" | jq .count)
            clones_uniques=$(echo "$clones" | jq .uniques)

            releases=$(curl -s -H "Authorization: Bearer $TOKEN" \
              https://api.github.com/repos/nedtaylor/athena/releases)

            downloads=$(echo "$releases" | jq '[.[].assets[].download_count] | add // 0')

            entry=$(jq -n \
              --arg date "$DATE" \
              --argjson stars "$stars" \
              --argjson forks "$forks" \
              --argjson clones "$clones_total" \
              --argjson uniques "$clones_uniques" \
              --argjson downloads "$downloads" \
              '{
                date:$date,
                stars:$stars,
                forks:$forks,
                clones:$clones,
                uniques:$uniques,
                downloads:$downloads
              }')

            tmp=$(jq --argjson e "$entry" '
              map(select(.date != $e.date)) + [$e]
            ' tmp.json)

            echo "$tmp" > tmp.json
          done

          mv tmp.json build/pages/metrics/history.json

  run-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: actions/checkout@v6

      - name: install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3

      - name: collect metrics
        shell: bash
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p build/pages/metrics

          DATE=$(date -u +"%Y-%m-%d")

          repo=$(curl -s -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/nedtaylor/athena)

          stars=$(echo "$repo" | jq .stargazers_count)
          forks=$(echo "$repo" | jq .forks_count)

          clones=$(curl -s -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/nedtaylor/athena/traffic/clones)

          clones_total=$(echo "$clones" | jq .count)
          clones_uniques=$(echo "$clones" | jq .uniques)

          releases=$(curl -s -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/nedtaylor/athena/releases)

          downloads=$(echo "$releases" | jq '[.[].assets[].download_count] | add // 0')

          entry=$(jq -n \
            --arg date "$DATE" \
            --argjson stars "$stars" \
            --argjson forks "$forks" \
            --argjson clones "$clones_total" \
            --argjson uniques "$clones_uniques" \
            --argjson downloads "$downloads" \
            '{
              date:$date,
              stars:$stars,
              forks:$forks,
              clones:$clones,
              uniques:$uniques,
              downloads:$downloads
            }')

          echo "$entry" > build/pages/metrics/latest.json

      - name: generate dashboard
        shell: bash
        run: |
          python3 << 'EOF'
          import json, os

          base = "build/pages/metrics"
          os.makedirs(base, exist_ok=True)

          history_path = f"{base}/history.json"
          latest_path = f"{base}/latest.json"

          data = []
          if os.path.exists(history_path):
              data = json.load(open(history_path))

          latest = json.load(open(latest_path))

          data = [d for d in data if d["date"] != latest["date"]]
          data.append(latest)

          json.dump(data, open(history_path,"w"), indent=2)
          html = ["<html><body><h1>Athena Metrics</h1><table border='1'>"]
          html.append("<tr><th>Date</th><th>Stars</th><th>Forks</th><th>Clones</th><th>Downloads</th></tr>")

          totals = {
              "stars": 0,
              "forks": 0,
              "clones": 0,
              "downloads": 0
          }

          for d in data:
              html.append(
                  f"<tr><td>{d['date']}</td><td>{d['stars']}</td>"
                  f"<td>{d['forks']}</td><td>{d['clones']}</td>"
                  f"<td>{d['downloads']}</td></tr>"
              )

              totals["stars"] = d["stars"]
              totals["forks"] = d["forks"]
              totals["clones"] += d["clones"]
              totals["downloads"] += d["downloads"]

          html.append(
              "<tr><th>TOTALS</th>"
              f"<th>{totals['stars']}</th>"
              f"<th>{totals['forks']}</th>"
              f"<th>{totals['clones']}</th>"
              f"<th>{totals['downloads']}</th></tr>"
          )

          html.append("</table></body></html>")
          open(f"{base}/index.html","w").write("\n".join(html))
          EOF

      - name: add coverage link to metrics page
        shell: bash
        run: |
          file="build/pages/metrics/index.html"

          if [ -f "$file" ]; then
            echo "<hr><p><a href='../coverage/'>🧪 View code coverage report</a></p>" >> "$file"
          fi

      - name: ensure dashboard index exists
        shell: bash
        run: |
          mkdir -p build/pages

          cat > build/pages/index.html << 'EOF'
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=./coverage/">
            <title>Athena Dashboard</title>
          </head>
          <body>
            <p>Redirecting to <a href="./coverage/">Coverage</a>...</p>
            <h1>📦 Athena Dashboard</h1>

            <ul>
              <li><a href="./coverage/">🧪 Coverage Report</a></li>
              <li><a href="./metrics/">📊 Metrics Dashboard</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/pages/

  deploy:
    if: |
      needs.run-metrics.result == 'success' &&
      (
        github.event_name == 'schedule' ||
        github.ref_name == 'main' ||
        inputs.allow_any_branch == 'true'
      )
    runs-on: ubuntu-latest
    needs: run-metrics

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: deploy metrics page
        id: deployment
        uses: actions/deploy-pages@v4
