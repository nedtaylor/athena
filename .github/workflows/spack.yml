name: run-spack-install

on:
  push:
    branches:
      - main
      - development
      - 'releases/**'
    paths:
      - '.github/workflows/spack.yml'
      - '.spack/**'
      - 'fpm.toml'
      - '**.f90'
  pull_request:
    paths:
      - '.github/workflows/spack.yml'
      - '.spack/**'
      - 'fpm.toml'
      - '**.f90'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: spack
  cancel-in-progress: false

jobs:
  install-with-spack:
    name: Install with Spack (gcc-15)
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: Install compiler + system dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common curl file git
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            bzip2 \
            gcc-15 \
            g++-15 \
            gfortran-15 \
            libopenblas-dev \
            make \
            patch \
            pkg-config \
            unzip \
            xz-utils \
            zstd

      - name: Clone Spack
        shell: bash
        run: |
          spack_root="$RUNNER_TEMP/spack"
          git clone --depth 1 https://github.com/spack/spack.git "$spack_root"
          echo "SPACK_ROOT=$spack_root" >> "$GITHUB_ENV"

      - name: Install athena with Spack
        shell: bash -l {0}
        run: |
          set -euo pipefail

          source "$SPACK_ROOT/share/spack/setup-env.sh"

          export SPACK_DISABLE_LOCAL_CONFIG=1
          export SPACK_USER_CACHE_PATH="$RUNNER_TEMP/spack-cache"
          export SPACK_USER_CONFIG_PATH="$RUNNER_TEMP/spack-config"

          compiler_version="$(gfortran-15 -dumpfullversion -dumpversion)"

          spack compiler find /usr/bin
          spack config add "packages:all:compiler:[gcc@${compiler_version}]"
          spack external find --not-buildable openblas || true
          spack repo add "$GITHUB_WORKSPACE/.spack"

          spack info athena-fortran
          spack spec athena-fortran
          spack install --fresh --show-log-on-error athena-fortran

      - name: Verify installed prefix
        shell: bash -l {0}
        run: |
          set -euo pipefail

          source "$SPACK_ROOT/share/spack/setup-env.sh"

          export SPACK_DISABLE_LOCAL_CONFIG=1
          export SPACK_USER_CACHE_PATH="$RUNNER_TEMP/spack-cache"
          export SPACK_USER_CONFIG_PATH="$RUNNER_TEMP/spack-config"

          prefix="$(spack location -i athena-fortran)"
          test -f "$prefix/include/athena.mod"
          test -f "$prefix/lib/libathena.a"
          spack find --paths athena-fortran
