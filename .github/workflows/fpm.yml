name: run-fpm-build

on:
  push:
    branches:
      - main
      - development
      - 'releases/**'
    paths:
      - ".github/workflows/fpm.yml"
      - "fpm.toml"
      - "**.f90"
  pull_request:
    paths:
      - ".github/workflows/fpm.yml"
      - "fpm.toml"
      - "**.f90"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fpm
  cancel-in-progress: false

jobs:
  build-and-test-fpm:
    name: Build and test (${{ matrix.os }}, ${{ matrix.build_type }}, ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [release, debug]
        toolchain: [gcc-14, gcc-15, intel-2025.2.1]
        exclude:
        - os: macos-latest
          toolchain: intel-2025.2.1
        include:
        - toolchain: gcc-14
          compiler: gcc
          version: 14
        - toolchain: gcc-15
          compiler: gcc
          version: 15
        - toolchain: intel-2025.2.1
          compiler: intel
          version: '2025.2.1'
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Install BLAS/LAPACK system libraries (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libblas-dev liblapack-dev

    - name: Setup compiler toolchain
      uses: fortran-lang/setup-fortran@v1
      id: setup-fortran
      with:
        compiler: ${{ matrix.compiler }}
        version: ${{ matrix.version }}

    - name: Normalise compiler environment
      shell: bash
      run: |
        compiler="${FC:-${{ steps.setup-fortran.outputs.fc }}}"
        if [ -z "$compiler" ]; then
          echo "Fortran compiler was not configured" >&2
          exit 1
        fi

        echo "FC=$compiler" >> "$GITHUB_ENV"
        echo "FPM_FC=$compiler" >> "$GITHUB_ENV"

    - name: Setup fpm (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      uses: fortran-lang/setup-fpm@v7
      id: setup-fpm
      with:
        fpm-version: "v0.13.0"

    - name: Install fpm (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        brew install fpm
        echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

    - name: Compile
      shell: bash -l {0}
      run: |
        build_dir="build/fpm-${{ runner.os }}-${{ matrix.toolchain }}-${{ matrix.build_type }}"
        "$FC" --version
        command -v fpm
        fpm --version
        fpm clean --all
        fpm build --profile ${{ matrix.build_type }} --compiler "$FC" --build-dir "$build_dir"

    - name: Test
      shell: bash -l {0}
      run: |
        build_dir="build/fpm-${{ runner.os }}-${{ matrix.toolchain }}-${{ matrix.build_type }}"
        "$FC" --version
        fpm test --profile ${{ matrix.build_type }} --compiler "$FC" --build-dir "$build_dir"
