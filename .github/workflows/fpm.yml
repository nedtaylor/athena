name: run-fpm-build

on:
  push:
    branches:
      - main
      - development
      - 'releases/**'
    paths:
      - ".github/workflows/fpm.yml"
      - "fpm.toml"
      - "**.f90"
  pull_request:
    paths:
      - ".github/workflows/fpm.yml"
      - "fpm.toml"
      - "**.f90"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fpm
  cancel-in-progress: false

jobs:
  build-and-test-fpm-local:
    if: github.actor == 'nektos/act'
    name: Build and test locally (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [release, debug]
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Install gfortran via apt
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y gcc-15 gfortran-15 libblas-dev liblapack-dev
        sudo update-alternatives --install /usr/bin/gfortran gfortran /usr/bin/gfortran-15 150
        echo "FC=$(command -v gfortran-15)" >> $GITHUB_ENV

    - uses: fortran-lang/setup-fpm@v7
      id: setup-fpm
      with:
        fpm-version: "v0.13.0"

    - name: Compile
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm build --profile ${{ matrix.build_type }} --compiler "$FC" --build-dir "build/act-${{ matrix.build_type }}"

    - name: Test
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm test --profile ${{ matrix.build_type }} --compiler "$FC" --build-dir "build/act-${{ matrix.build_type }}"

  build-and-test-fpm-debug:
    if: github.actor != 'nektos/act'
    name: Build and test in debug mode
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        build_type: [release, debug]
        toolchain:
        - {compiler: gcc, version: 14}
        - {compiler: gcc, version: 15}
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Install BLAS/LAPACK system libraries
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libblas-dev liblapack-dev

    # ----------------------------------------------------
    # Conda path (Linux + GCC)
    # ----------------------------------------------------
    - name: Setup conda (for gfortran on Linux)
      if: matrix.os == 'ubuntu-latest' && matrix.toolchain.compiler == 'gcc'
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: 3.11
        installation-dir: ${{ runner.temp }}/miniconda3
        pkgs-dirs: ${{ runner.temp }}/conda-pkgs
        run-post: ${{ github.actor == 'nektos/act' && 'false' || 'true' }}

    - name: Install gfortran via conda
      if: matrix.os == 'ubuntu-latest' && matrix.toolchain.compiler == 'gcc'
      shell: bash -l {0}
      run: |
        conda install -y -c conda-forge "gfortran=${{ matrix.toolchain.version }}"
        echo "FC=$(which gfortran)" >> $GITHUB_ENV

    # ----------------------------------------------------
    - uses: fortran-lang/setup-fpm@v7
      id: setup-fpm
      with:
        fpm-version: "v0.13.0"

    - name: Compile
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm build --profile ${{ matrix.build_type }} --compiler "$FC"

    - name: Test
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm test --profile ${{ matrix.build_type }} --compiler "$FC"
