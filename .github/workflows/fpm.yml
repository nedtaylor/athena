name: run-fpm-build

on:
  push:
    branches:
      - main
      - development
      - 'releases/**'
    paths:
      - ".github/workflows/fpm.yml"
      - "fpm.toml"
      - "**.f90"
  pull_request:
    paths:
      - ".github/workflows/fpm.yml"
      - "fpm.toml"
      - "**.f90"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fpm
  cancel-in-progress: false

jobs:
  build-and-test-fpm-local:
    if: github.actor == 'nektos/act'
    name: Build and test locally (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [release, debug]
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Install gfortran via apt
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y gcc-15 gfortran-15 libblas-dev liblapack-dev
        sudo update-alternatives --install /usr/bin/gfortran gfortran /usr/bin/gfortran-15 150
        echo "FC=$(command -v gfortran-15)" >> $GITHUB_ENV

    - uses: fortran-lang/setup-fpm@v7
      id: setup-fpm
      with:
        fpm-version: "v0.13.0"

    - name: Compile
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm build --profile ${{ matrix.build_type }} --compiler "$FC" --build-dir "build/act-${{ matrix.build_type }}"

    - name: Test
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm test --profile ${{ matrix.build_type }} --compiler "$FC" --build-dir "build/act-${{ matrix.build_type }}"


  build-and-test-fpm-hosted:
    if: github.actor != 'nektos/act'
    name: Build and test (${{ matrix.os }}, ${{ matrix.build_type }}, ${{ matrix.toolchain.compiler }}, ${{ matrix.toolchain.version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [release, debug]
        toolchain:
        - {compiler: gcc, version: 14}
        - {compiler: gcc, version: 15}
        - {compiler: intel, version: '2025.2'}
        exclude:
        - os: macos-latest
          toolchain: {compiler: intel, version: '2025.2'}
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Install BLAS/LAPACK system libraries (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y libblas-dev liblapack-dev

    - name: Install BLAS/LAPACK system libraries (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        brew update
        brew install openblas lapack
        echo "LIBRARY_PATH=$(brew --prefix openblas)/lib:$(brew --prefix lapack)/lib${LIBRARY_PATH:+:$LIBRARY_PATH}" >> $GITHUB_ENV
        echo "LDFLAGS=-L$(brew --prefix openblas)/lib -L$(brew --prefix lapack)/lib ${LDFLAGS:-}" >> $GITHUB_ENV
        echo "CPPFLAGS=-I$(brew --prefix openblas)/include -I$(brew --prefix lapack)/include ${CPPFLAGS:-}" >> $GITHUB_ENV

    - name: Setup compiler toolchain
      uses: fortran-lang/setup-fortran@v1
      id: setup-fortran
      with:
        compiler: ${{ matrix.toolchain.compiler }}
        version: ${{ matrix.toolchain.version }}

    - uses: fortran-lang/setup-fpm@v7
      id: setup-fpm
      with:
        fpm-version: "v0.13.0"

    - name: Compile
      shell: bash
      run: |
        build_dir="build/fpm-${{ runner.os }}-${{ matrix.toolchain.compiler }}-${{ matrix.toolchain.version }}-${{ matrix.build_type }}"
        "$FC" --version
        fpm build --profile ${{ matrix.build_type }} --compiler "$FC" --build-dir "$build_dir"

    - name: Test
      shell: bash
      run: |
        build_dir="build/fpm-${{ runner.os }}-${{ matrix.toolchain.compiler }}-${{ matrix.toolchain.version }}-${{ matrix.build_type }}"
        "$FC" --version
        fpm test --profile ${{ matrix.build_type }} --compiler "$FC" --build-dir "$build_dir"
