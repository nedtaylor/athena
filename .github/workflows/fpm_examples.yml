name: run-fpm-examples

on:
  push:
    branches:
      - main
      - development
      - 'releases/**'
    paths:
      - ".github/workflows/fpm_examples.yml"
      - "fpm.toml"
      - "**.f90"
  pull_request:
    paths:
      - ".github/workflows/fpm_examples.yml"
      - "fpm.toml"
      - "**.f90"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fpm
  cancel-in-progress: false

jobs:
  build-and-test-fpm-local:
    if: github.actor == 'nektos/act'
    name: Run examples locally in debug mode
    runs-on: ubuntu-latest
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Install gfortran via apt
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y gcc-15 gfortran-15 unzip libblas-dev liblapack-dev
        sudo update-alternatives --install /usr/bin/gfortran gfortran /usr/bin/gfortran-15 150
        echo "FC=$(command -v gfortran-15)" >> $GITHUB_ENV

    - uses: fortran-lang/setup-fpm@v7
      id: setup-fpm
      with:
        fpm-version: "v0.13.0"

    - name: Download MNIST dataset
      run: |
        mnist_dir="$GITHUB_WORKSPACE/.ci-data/MNIST-txt"
        mnist_input_dir=".ci-data/MNIST-txt"

        mkdir -p "$GITHUB_WORKSPACE/.ci-data"

        if [ ! -d "$mnist_dir" ]; then
          git clone https://github.com/halimb/MNIST-txt.git "$mnist_dir"
        fi

        unzip -o "$mnist_dir/MNIST_txt.zip" -d "$mnist_dir"
        sed -i "s|^[[:space:]]*dataset_dir = .*| dataset_dir = \"$mnist_input_dir\"|" example/mnist/test_job.in

    - name: Run examples
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm run --example mnist --profile debug --compiler "$FC" --build-dir build/act-examples

  build-and-test-fpm-debug:
    if: github.actor != 'nektos/act'
    name: Run examples in debug mode
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain:
        - {compiler: gcc, version: 15}
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Install gfortran via apt
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y gcc-15 gfortran-15 unzip libblas-dev liblapack-dev
        sudo update-alternatives --install /usr/bin/gfortran gfortran /usr/bin/gfortran-15 150
        echo "FC=$(command -v gfortran-15)" >> $GITHUB_ENV

    # ----------------------------------------------------
    - uses: fortran-lang/setup-fpm@v7
      id: setup-fpm
      with:
        fpm-version: "v0.13.0"

    - name: Download MNIST dataset
      run: |
        mnist_dir="$GITHUB_WORKSPACE/.ci-data/MNIST-txt"
        mnist_input_dir=".ci-data/MNIST-txt"

        mkdir -p "$GITHUB_WORKSPACE/.ci-data"

        if [ ! -d "$mnist_dir" ]; then
          git clone https://github.com/halimb/MNIST-txt.git "$mnist_dir"
        fi

        unzip -o "$mnist_dir/MNIST_txt.zip" -d "$mnist_dir"
        sed -i "s|^[[:space:]]*dataset_dir = .*| dataset_dir = \"$mnist_input_dir\"|" example/mnist/test_job.in

    - name: Run examples
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm run --example mnist --profile debug --compiler "$FC"
