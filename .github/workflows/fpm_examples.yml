name: run-fpm-examples

on:
  push:
    branches:
      - main
      - development
    paths:
      - ".github/workflows/fpm_examples.yml"
      - "fpm.toml"
      - "**.f90"
  pull_request:
    paths:
      - ".github/workflows/fpm_examples.yml"
      - "fpm.toml"
      - "**.f90"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: fpm
  cancel-in-progress: false

jobs:
  build-and-test-fpm-example:
    name: Run examples in debug mode
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc]
        version: [15]
    steps:
    - name: checkout repo
      uses: actions/checkout@v4

    - name: Setup compiler toolchain
      uses: fortran-lang/setup-fortran@v1
      id: setup-fortran
      with:
        compiler: ${{ matrix.compiler }}
        version: ${{ matrix.version }}

    - name: Normalise compiler environment
      shell: bash
      run: |
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y software-properties-common
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y unzip libblas-dev liblapack-dev

        compiler="${FC:-${{ steps.setup-fortran.outputs.fc }}}"
        if [ -z "$compiler" ]; then
          echo "Fortran compiler was not configured" >&2
          exit 1
        fi

        echo "FC=$compiler" >> "$GITHUB_ENV"
        echo "FPM_FC=$compiler" >> "$GITHUB_ENV"

    # ----------------------------------------------------
    - uses: fortran-lang/setup-fpm@v7
      id: setup-fpm
      with:
        fpm-version: "v0.13.0"

    - name: Download MNIST dataset
      run: |
        mnist_dir="$GITHUB_WORKSPACE/.ci-data/MNIST-txt"
        mnist_input_dir=".ci-data/MNIST-txt"

        mkdir -p "$GITHUB_WORKSPACE/.ci-data"

        if [ ! -d "$mnist_dir" ]; then
          git clone https://github.com/halimb/MNIST-txt.git "$mnist_dir"
        fi

        unzip -o "$mnist_dir/MNIST_txt.zip" -d "$mnist_dir"
        echo "MNIST dataset is available at $mnist_dir"
        echo "MNIST dataset is available at $mnist_input_dir"
        sed -i "s|^[[:space:]]*dataset_dir = .*| dataset_dir = \"$mnist_input_dir\"|" example/mnist/test_job.in

        # cat the modified test_job.in to verify the change
        echo "Modified test_job.in:"
        cat example/mnist/test_job.in

        # ls the mnist_input_dir to verify the files are there
        echo "Contents of $mnist_input_dir:"
        ls -l "$mnist_input_dir"

    - name: Run examples
      shell: bash -l {0}
      run: |
        "$FC" --version
        fpm clean --all
        fpm run --example mnist --profile debug --compiler "$FC"
